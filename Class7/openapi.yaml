openapi: 3.0.3
info:
  title: Product API
  version: 1.0.0
  description: Simple CRUD API for Product using Flask and MongoDB
servers:
  - url: http://127.0.0.1:5000
paths:
  /api/v1/products:
    get:
      summary: Get all products
      tags:
        - Products
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      summary: Create a product
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid request body
  /api/v1/products/{product_id}:
    get:
      summary: Get product by ID
      tags:
        - Products
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "200":
          description: Product detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Product not found
    put:
      summary: Update product by ID
      tags:
        - Products
      parameters:
        - $ref: "#/components/parameters/ProductId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "400":
          description: Invalid request body
        "404":
          description: Product not found
    delete:
      summary: Delete product by ID
      tags:
        - Products
      parameters:
        - $ref: "#/components/parameters/ProductId"
      responses:
        "204":
          description: Deleted
        "404":
          description: Product not found
components:
  parameters:
    ProductId:
      name: product_id
      in: path
      required: true
      schema:
        type: string
  schemas:
    Product:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        price:
          type: number
        in_stock:
          type: boolean
      required:
        - id
        - name
        - price
        - in_stock
    CreateProductInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        in_stock:
          type: boolean
      required:
        - name
        - price
    UpdateProductInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        in_stock:
          type: boolean
