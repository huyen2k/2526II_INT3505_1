swagger: "2.0"
info:
  title: Books API
  description: Simple API for managing books
  version: "1.0"

basePath: /api/v1

paths:
  /books:
    get:
      summary: Get list of books
      parameters:
        - name: page
          in: query
          type: integer
        - name: limit
          in: query
          type: integer
        - name: q
          in: query
          type: string
      responses:
        200:
          description: OK

    post:
      summary: Create a book
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required:
              - title
              - author
            properties:
              title:
                type: string
              author:
                type: string
      responses:
        201:
          description: Created

  /books/{book_id}:
    get:
      summary: Get book by ID
      parameters:
        - name: book_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: OK

    put:
      summary: Update book
      parameters:
        - name: book_id
          in: path
          type: integer
          required: true
        - in: body
          name: body
          schema:
            type: object
            properties:
              title:
                type: string
              author:
                type: string
      responses:
        200:
          description: OK

    delete:
      summary: Delete book
      parameters:
        - name: book_id
          in: path
          type: integer
          required: true
      responses:
        200:
          description: Deleted