swagger: "2.0"
info:
  title: JWT Demo API
  version: "1.0"
  description: Simple JWT Authentication API

basePath: /api/v1

paths:
  /login:
    post:
      summary: Login to get JWT token
      parameters:
        - in: body
          name: body
          schema:
            type: object
            required:
              - username
              - password
            properties:
              username:
                type: string
              password:
                type: string
      responses:
        200:
          description: Token returned

  /profile:
    get:
      summary: Get user profile (Protected)
      security:
        - Bearer: []
      responses:
        200:
          description: Success

securityDefinitions:
  Bearer:
    type: apiKey
    name: Authorization
    in: header